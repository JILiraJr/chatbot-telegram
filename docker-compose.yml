services:
  n8n-editor:
    image: n8nio/n8n:2.22.5
    container_name: n8n-editor-ftr
    ports:
      - "5678:5678"
    volumes:
      - ./n8n-data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      ## Postgres (credenciais devem bater com o volume em ./postgres-data)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=postgres
      ## Queue Mode
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      ## Webhook URL (atualize no .env após subir o ngrok)
      - WEBHOOK_URL=${WEBHOOK_URL}
      ## API keys (lidas do arquivo .env na raiz do projeto)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      ## Permite $env.OPENWEATHER_API_KEY nos nós (HTTP Request)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    networks:
      - n8n-ftr
    depends_on:
      - postgres
      - redis
    restart: always

  n8n-worker:
    image: n8nio/n8n:2.22.5
    command: worker
    volumes:
      - ./n8n-data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      ## Postgres (credenciais devem bater com o volume em ./postgres-data)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=postgres
      ## Queue Mode
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
      ## Webhook URL (atualize no .env após subir o ngrok)
      - WEBHOOK_URL=${WEBHOOK_URL}
      ## API keys (lidas do arquivo .env na raiz do projeto)
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      ## Permite $env.OPENWEATHER_API_KEY nos nós (HTTP Request)
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    networks:
      - n8n-ftr
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: ankane/pgvector
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=n8n
    networks:
      - n8n-ftr
    restart: always

  redis:
    image: redis:alpine
    volumes:
      - ./redis-data:/data
    networks:
      - n8n-ftr
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040"
    command: http n8n-editor-ftr:5678
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    networks:
      - n8n-ftr
    restart: always
    depends_on:
      - n8n-editor


networks:
  n8n-ftr:
    driver: bridge

    